<div class="login-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ modoRegistro ? 'Crear cuenta' : 'Iniciar sesión' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="enviar()">
        <mat-form-field class="full-width" appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
          <mat-error *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
            {{ obtenerMensajeError(form.get('email')?.errors ?? null) }}
          </mat-error>
        </mat-form-field>

        <mat-form-field class="full-width" appearance="outline">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          <mat-error *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
            {{ obtenerMensajeError(form.get('password')?.errors ?? null) }}
          </mat-error>
        </mat-form-field>

        <p class="error-mensaje" *ngIf="errorMensaje">{{ errorMensaje }}</p>

        <button mat-raised-button color="primary" type="submit" class="full-width" [disabled]="cargando">
          <mat-spinner *ngIf="cargando" diameter="20" class="spinner-inline"></mat-spinner>
          <span *ngIf="!cargando">{{ modoRegistro ? 'Registrarme' : 'Ingresar' }}</span>
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <button mat-button type="button" (click)="alternarModo()">
        {{ modoRegistro ? '¿Ya tenés cuenta? Iniciá sesión' : '¿No tenés cuenta? Registrate' }}
      </button>
    </mat-card-actions>
  </mat-card>
</div>
